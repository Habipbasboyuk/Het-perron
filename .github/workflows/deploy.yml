name: Deploy naar WPMU DEV
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy via SCP
        run: |
          scp -v -P 22 -o StrictHostKeyChecking=no -o BatchMode=yes -r . hetperron@hetperron.tempurl.host:/site/public_html/wp-content/themes/
